{% extends "base.html" %}

{% block title %}Page Not Found — EventForge{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <div class="text-center">
        <p class="text-6xl font-bold text-primary-600 mb-4">404</p>
        <h1 class="text-3xl font-bold text-gray-900 sm:text-4xl mb-4">Page Not Found</h1>
        <p class="text-lg text-gray-500 max-w-md mx-auto mb-8">
            Sorry, we couldn't find the page or event you're looking for. It may have been moved, deleted, or never existed.
        </p>
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="/events" class="inline-flex items-center px-6 py-3 rounded-lg text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 transition-colors shadow-sm">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                Browse Events
            </a>
            <a href="/" class="inline-flex items-center px-6 py-3 rounded-lg text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 transition-colors shadow-sm">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>
                </svg>
                Go Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
